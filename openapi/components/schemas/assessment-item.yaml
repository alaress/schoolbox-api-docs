title: an Assessment Item
description: An assessment item.
readOnly: true
type: object
properties:
  id:
    $ref: ./id.yaml
  title:
    type: string
    example: Turning on the computer
  assessmentType:
    type: string
    enum:
      - dueWork
      - quiz
      - task
      - project
      - LTI
      - lessonPlan
      - dialogAgent
    example: task
  folder:
    description: |
      The folder where the assessment is found.
    type: object
    properties:
      id:
        type: integer
        description: The ID of the folder.
      name:
        type: string
        description: The name of the folder.
      code:
        description: Class Codes associated with the folder.
        oneOf:
          - type: string
            nullable: true
          - type: array
            items:
              type: string
      yearLevel:
        description: |
          Year levels which the folder is associated with.
        type: array
        nullable: true
        items:
          type: object
          properties:
            id:
              $ref: id.yaml
            name:
              type: string
              description: The name of the year level.
  subjectCode:
    type: string
    nullable: true
    description: |
      The Course Subject Code
  commonAssessment:
    type: boolean
    nullable: true
    description: |
      Only applicable for assessmentType 'dueWork' (so value will be null for other assessmentTypes).
  workType:
    type: object
    nullable: true
    description: |
      System configurable in your Admin Lists Work Types area.
      Not applicable to assessmentType 'lessonPlan' (so value will be null in that case).
    properties:
      id:
        type: integer
        description: The DB identifier of the worktype.
        example: 1
      name:
        type: string
        description: The name of the work type, may not be unique.
        example: Formative Assessment
  weight:
    type: integer
    nullable: true
    example: 30
    description: |
      The value of how much this assessment's outcome contributes to the final overall grade -
      a value of 0 indicates this assessment has no impact on the overall grade.
      Generally, this is a number between 0 and 100.
      Not applicable to assessmentTypes 'lessonPlan' and 'task' (so value will be null in those cases).
  dueDate:
    type: string
    nullable: true
    format: date-time
    description: |
      The due date of the assessment as a RFC3339 string. This can be null for assessments in a course.
    example: 2022-01-30T21:00:00.000Z
  rubric:
    $ref: ./assessment-rubric.yaml
  project:
    type: object
    nullable: true
    properties:
      id:
        type: integer
        description: ID of the parent assessment (project).
        example: 255
  participants:
    type: array
    nullable: true
    items:
      $ref: ./assessment-participation-item.yaml
    description: Not applicable to assessmentType 'lessonPlan' (so value will be null in that case).
  specificationAssessmentId:
    type: integer
    nullable: true
    description: |
      The ID of the specification assessment that this assessment was created from.
      Enables identifying common assessments across classes.
      Null if this assessment has no specification link.
    example: 42
  markVisibility:
    type: integer
    nullable: true
    enum: [0, 1, 2]
    description: |
      Controls who can view the mark for this assessment.
      - `0`: Staff Only
      - `1`: Staff & Student
      - `2`: Staff, Student & Parent
      Applicable to assessmentTypes 'dueWork', 'quiz', 'project', and 'LTI' (null for other types).
    example: 1
  markType:
    type: string
    nullable: true
    enum:
      - percent
      - letter
      - raw
      - free
      - rubric
      - none
      - completion
    description: |
      The type of mark used for this assessment.
      Applicable to assessmentTypes 'dueWork', 'quiz', and 'project' (null for other types).
    example: percent
  description:
    type: string
    nullable: true
    description: |
      A longer description of the assessment. Null if no description has been set.
    example: "Write a 500 word essay on the causes of WW1."
